# Headlamp Helm Values
# Cluster: homelab k3s | Updated: April 2026

replicaCount: 1

config:
  inCluster: true
  inClusterContextName: "homelab"

serviceAccount:
  create: true

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
