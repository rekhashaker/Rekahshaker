# kube-prometheus-stack Helm Values
# Cluster: homelab k3s | Updated: April 2026

grafana:
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
  persistence:
    enabled: true
    storageClassName: unraid-nfs
    size: 5Gi
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    retention: 30d
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      runAsNonRoot: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: unraid-nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      runAsNonRoot: false
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: unraid-nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
